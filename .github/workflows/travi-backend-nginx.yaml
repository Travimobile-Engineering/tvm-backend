name: Build and Push Travi Backend NGINX Image to Registry

on:
  push:
    branches: [ master, staging, dev ]

env:
  IMAGE_URI: "820242924853.dkr.ecr.eu-west-2.amazonaws.com/backend-nginx"

jobs:
  build-nginx-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Authenticate to ECR
        run: aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin $IMAGE_URI

      - name: Extract short commit SHA
        run: echo "short_commit_sha=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Determine tag
        run: |
          if [[ $GITHUB_REF == refs/heads/master ]]; then
            echo "tag=main" >> $GITHUB_ENV
          elif [[ $GITHUB_REF == refs/heads/staging ]]; then
            echo "tag=stg" >> $GITHUB_ENV
          elif [[ $GITHUB_REF == refs/heads/dev ]]; then
            echo "tag=dev" >> $GITHUB_ENV
          fi

      - name: Build NGINX Docker image
        run: docker build -f Dockerfile.nginx -t $IMAGE_URI:${{ env.tag }} .

      - name: Push image
        run: docker push $IMAGE_URI:${{ env.tag }}

      - name: Slack alert on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*Docker Build Failed*: ${{ job.status }} — <${{ github.event.head_commit.url }}> on *${{ github.ref_name }}* by @${{ github.actor }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Docker Build Failed*\nBranch: `${{ github.ref_name }}`\nTriggered by: @${{ github.actor }}\n<${{ github.event.head_commit.url }}>"

    

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP and Node dependencies
        run: |
          sudo apt update
          sudo apt install -y unzip openjdk-11-jre
          composer install --no-dev
          npm install

      - name: Run dependency check
        run: |
          mkdir -p ./reports
          dependency-check \
            --format JSON \
            --format XML \
            --project travi-backend-nginx \
            --out ./reports \
            --scan .

      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: ./reports/dependency-check-report.xml
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Dependency Check Scan
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend-NGINX
        run: python upload-scan-report.py

      - name: Slack alert on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*Dependency Check Failed* on `${{ github.ref_name }}`"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Dependency Check Failed*\nBranch: `${{ github.ref_name }}`\nCommit: <${{ github.event.head_commit.url }}>"

  sast-semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: semgrep scan --config=auto --error --json --output semgrep.json

      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: semgrep.json
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Semgrep JSON Report
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend-NGINX
        run: python upload-scan-report.py

      - name: Slack alert on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*Semgrep Scan Failed* on `${{ github.ref_name }}`"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Semgrep SAST Failed*\nBranch: `${{ github.ref_name }}`\nCommit: <${{ github.event.head_commit.url }}>"

