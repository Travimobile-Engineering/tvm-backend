name: Build and Push Travi Backend Nginx Image to Docker Hub

on:
  push:
    branches: [ master, staging, dev ]

jobs:
  build-image:
    runs-on: ubuntu-latest
    name: Build and push Docker image to Docker Hub

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set environment variables
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "$GITHUB_REF" == "refs/heads/master" ]]; then
            echo "TAG=${SHORT_SHA}-prod"                    >> $GITHUB_ENV
            echo "IMAGE_NAME=travi3/backend-nginx-prod"    >> $GITHUB_ENV

          elif [[ "$GITHUB_REF" == "refs/heads/staging" ]]; then
            echo "TAG=${SHORT_SHA}-stg"                    >> $GITHUB_ENV
            echo "IMAGE_NAME=travi3/backend-nginx-stg"     >> $GITHUB_ENV

          elif [[ "$GITHUB_REF" == "refs/heads/dev" ]]; then
            echo "TAG=${SHORT_SHA}-dev"                    >> $GITHUB_ENV
            echo "IMAGE_NAME=travi3/backend-nginx-dev"     >> $GITHUB_ENV
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.nginx \
            -t ${{ env.IMAGE_NAME }}:${{ env.TAG }} \
            .

      - name: Push Docker image
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.TAG }}

      - name: Logout from Docker Hub
        if: always()
        run: docker logout