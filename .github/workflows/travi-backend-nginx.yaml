name: Build and Push Travi Backend Nginx Image to Registry

on:
  push:
    branches: [ master, staging, dev ]
  workflow_dispatch:

env:
  IMAGE_URI: "travi3/travimobile-backend-nginx"

jobs:
  build-image:
    runs-on: ubuntu-latest
    name: 'Build and push docker image to Artifact Registry'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          
      - name: Extract short commit SHA
        id: vars
        run: echo "short_commit_sha=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Determine tag
        id: tag
        run: |
          if [[ $GITHUB_REF == refs/heads/master ]]; then
            echo "tag=main" >> $GITHUB_ENV
          elif [[ $GITHUB_REF == refs/heads/staging ]]; then
            echo "tag=stg" >> $GITHUB_ENV
          elif [[ $GITHUB_REF == refs/heads/dev ]]; then
            echo "tag=dev" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: docker build -f Dockerfile.nginx -t $IMAGE_URI:${{ env.tag }} .

      - name: Push Docker image to Artifact Registry
        run: docker push $IMAGE_URI:${{ env.tag }}
