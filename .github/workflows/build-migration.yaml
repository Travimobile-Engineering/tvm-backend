name: Laravel Backend CI/CD Migration

on:
  push:
    branches:
      - 'feature/*'
      - main
      - staging
      - dev

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Secret Scanning
  # ─────────────────────────────────────────
  check-for-leaked-secrets:
    runs-on: ubuntu-latest
    container:
      image: zricethezav/gitleaks:v8.26.0
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python (Alpine Linux)
        run: |
          apk update
          apk add --no-cache python3 py3-pip

      - name: Disable Git ownership check
        run: git config --global --add safe.directory "*"

      - name: Scan the code for leaked secrets
        run: gitleaks detect --verbose --source . -f json -r gitleaks.json

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: gitleaks.json
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Gitleaks Scan
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: |
          . venv/bin/activate
          python upload-scan-report.py

      - name: Import Secrets from Vault
        if: failure()
        uses: hashicorp/vault-action@v2
        with:
          url: https://vault.travimobile.com
          method: jwt
          role: github-actions-role
          secrets: |
            secret/data/ci-cd TEAMS_WEBHOOK_URL | TEAMS_WEBHOOK_URL

      - name: Microsoft Teams Notification
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"text\": \"❌ Secret Leak Detected on \`${{ github.ref_name }}\`\",
            \"sections\": [{
              \"facts\": [
                { \"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\" },
                { \"name\": \"Commit\", \"value\": \"${{ github.sha }}\" },
                { \"name\": \"Author\", \"value\": \"${{ github.actor }}\" },
                { \"name\": \"Details\", \"value\": \"${{ github.event.head_commit.url }}\" }
              ]
            }]
          }" \
          "$TEAMS_WEBHOOK_URL"

  # ─────────────────────────────────────────
  # JOB 2: Dependency Scanning
  # ─────────────────────────────────────────
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies
        run: npm install

      - name: Install dependency-check CLI
        run: |
          chmod +x dependency-check.sh
          ./dependency-check.sh

      - name: Run dependency-check scan
        run: |
          mkdir -p ./dc-data ./reports
          dependency-check \
            --nvdApiDelay 7000 \
            --nvdApiKey ${{ secrets.NVD_API }} \
            --data ./dc-data \
            --scan . \
            --log ./reports/dependency-check.log \
            --enableExperimental \
            --format JSON \
            --format XML \
            --failOnCVSS 4.0 \
            --out ./reports/

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: ./reports/dependency-check-report.xml
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Dependency Check Scan
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: |
          . venv/bin/activate
          python upload-scan-report.py

      - name: Import Secrets from Vault
        if: failure()
        uses: hashicorp/vault-action@v2
        with:
          url: https://vault.travimobile.com
          method: jwt
          role: github-actions-role
          secrets: |
            secret/data/ci-cd TEAMS_WEBHOOK_URL | TEAMS_WEBHOOK_URL

      - name: Microsoft Teams Notification
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"text\": \"❌ Dependency Scan Failed on \`${{ github.ref_name }}\`\",
            \"sections\": [{
              \"facts\": [
                { \"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\" },
                { \"name\": \"Commit\", \"value\": \"${{ github.sha }}\" },
                { \"name\": \"Author\", \"value\": \"${{ github.actor }}\" },
                { \"name\": \"Details\", \"value\": \"${{ github.event.head_commit.url }}\" }
              ]
            }]
          }" \
          "$TEAMS_WEBHOOK_URL"

  # ─────────────────────────────────────────
  # JOB 3: SAST Scanning (Semgrep)
  # ─────────────────────────────────────────
  SAST-test:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: semgrep scan --config=auto --error --verbose --json --output semgrep.json

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: semgrep.json
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Semgrep JSON Report
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: |
          . venv/bin/activate
          python upload-scan-report.py

      - name: Import Secrets from Vault
        if: failure()
        uses: hashicorp/vault-action@v2
        with:
          url: https://vault.travimobile.com
          method: jwt
          role: github-actions-role
          secrets: |
            secret/data/ci-cd TEAMS_WEBHOOK_URL | TEAMS_WEBHOOK_URL

      - name: Microsoft Teams Notification
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"text\": \"❌ SAST Scan Failed on \`${{ github.ref_name }}\`\",
            \"sections\": [{
              \"facts\": [
                { \"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\" },
                { \"name\": \"Commit\", \"value\": \"${{ github.sha }}\" },
                { \"name\": \"Author\", \"value\": \"${{ github.actor }}\" },
                { \"name\": \"Details\", \"value\": \"${{ github.event.head_commit.url }}\" }
              ]
            }]
          }" \
          "$TEAMS_WEBHOOK_URL"

  # ─────────────────────────────────────────
  # JOB 4: Unit Testing
  # ─────────────────────────────────────────
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, intl, pdo, pdo_mysql
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Import Laravel Secrets from Vault
        uses: hashicorp/vault-action@v2
        with:
          url: https://vault.travimobile.com
          method: jwt
          role: github-actions-role
          secrets: |
            secret/data/laravel APP_KEY           | APP_KEY ;
            secret/data/laravel DB_HOST           | DB_HOST ;
            secret/data/laravel DB_PORT           | DB_PORT ;
            secret/data/laravel DB_DATABASE       | DB_DATABASE ;
            secret/data/laravel DB_USERNAME       | DB_USERNAME ;
            secret/data/laravel DB_PASSWORD       | DB_PASSWORD ;
            secret/data/ci-cd   TEAMS_WEBHOOK_URL | TEAMS_WEBHOOK_URL

      - name: Set up .env from Vault secrets
        run: |
          cp .env.example .env
          echo "APP_KEY=${{ env.APP_KEY }}"           >> .env
          echo "APP_ENV=testing"                       >> .env
          echo "APP_DEBUG=false"                       >> .env
          echo "DB_HOST=${{ env.DB_HOST }}"           >> .env
          echo "DB_PORT=${{ env.DB_PORT }}"           >> .env
          echo "DB_DATABASE=${{ env.DB_DATABASE }}"   >> .env
          echo "DB_USERNAME=${{ env.DB_USERNAME }}"   >> .env
          echo "DB_PASSWORD=${{ env.DB_PASSWORD }}"   >> .env
          # Disable OpenTelemetry in CI (no collector running)
          echo "OTEL_SDK_DISABLED=true"               >> .env
          echo "OTEL_TRACES_EXPORTER=none"            >> .env
          echo "OTEL_METRICS_EXPORTER=none"           >> .env
          echo "OTEL_LOGS_EXPORTER=none"              >> .env
          # Use simple local logging only
          echo "LOG_CHANNEL=single"                   >> .env
          echo "LOG_SLACK_WEBHOOK_URL="               >> .env

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run unit tests
        run: |
          mkdir -p ./reports
          php artisan test \
            --parallel \
            --log-junit ./reports/unit-test-report.xml

      - name: Install requests package
        if: failure()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

      - name: Upload Test Results to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: ./reports/unit-test-report.xml
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Generic Findings Import
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: |
          . venv/bin/activate
          python upload-scan-report.py

      - name: Microsoft Teams Notification
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"text\": \"❌ Unit Tests Failed on \`${{ github.ref_name }}\`\",
            \"sections\": [{
              \"facts\": [
                { \"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\" },
                { \"name\": \"Commit\", \"value\": \"${{ github.sha }}\" },
                { \"name\": \"Author\", \"value\": \"${{ github.actor }}\" },
                { \"name\": \"Details\", \"value\": \"${{ github.event.head_commit.url }}\" }
              ]
            }]
          }" \
          "$TEAMS_WEBHOOK_URL"

  # ─────────────────────────────────────────
  # JOB 5: Build & Push Docker Image
  # ─────────────────────────────────────────
  build-and-push-docker:
    runs-on: ubuntu-latest
    needs:
      - unit-test
      - check-for-leaked-secrets
      - dependency-scan
      - SAST-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Import Docker & Notification Secrets from Vault
        uses: hashicorp/vault-action@v2
        with:
          url: https://vault.travimobile.com
          method: jwt
          role: github-actions-role
          secrets: |
            secret/data/ci-cd DOCKERHUB_USERNAME | DOCKERHUB_USERNAME ;
            secret/data/ci-cd DOCKERHUB_TOKEN    | DOCKERHUB_TOKEN ;
            secret/data/ci-cd TEAMS_WEBHOOK_URL  | TEAMS_WEBHOOK_URL

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/laravel-backend:${{ github.ref_name }}

      - name: Logout from Docker Hub
        if: always()
        run: docker logout

      - name: Microsoft Teams Notification on Success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"text\": \"✅ Build & Push Successful on \`${{ github.ref_name }}\`\",
            \"sections\": [{
              \"facts\": [
                { \"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\" },
                { \"name\": \"Image\", \"value\": \"laravel-backend:${{ github.ref_name }}\" },
                { \"name\": \"Author\", \"value\": \"${{ github.actor }}\" },
                { \"name\": \"Commit\", \"value\": \"${{ github.sha }}\" }
              ]
            }]
          }" \
          "$TEAMS_WEBHOOK_URL"

      - name: Microsoft Teams Notification on Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"text\": \"❌ Build & Push Failed on \`${{ github.ref_name }}\`\",
            \"sections\": [{
              \"facts\": [
                { \"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\" },
                { \"name\": \"Author\", \"value\": \"${{ github.actor }}\" },
                { \"name\": \"Details\", \"value\": \"${{ github.event.head_commit.url }}\" }
              ]
            }]
          }" \
          "$TEAMS_WEBHOOK_URL"