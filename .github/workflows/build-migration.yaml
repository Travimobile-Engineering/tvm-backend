name: Laravel Backend CI/CD Migration 

on:
  push:
    branches:
      - 'feature/*'
      - main
      - staging
      - dev
  pull_request:

jobs:
  check-for-leaked-secrets:
    runs-on: ubuntu-latest
    container:
      image: zricethezav/gitleaks:v8.26.0
    steps:
      - uses: actions/checkout@v3

      - name: Run Gitleaks
        run: |
          git config --global --add safe.directory "*"
          gitleaks detect --verbose --source . -f json -r gitleaks.json || true

          if [ -s gitleaks.json ]; then
            echo "Leaks found"
            exit 1
          fi

  semgrep-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip

      - run: |
          pip install semgrep
          semgrep scan --config=auto

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - run: composer install --no-interaction --prefer-dist --no-dev

      - name: Install dependency-check
        run: |
          wget https://github.com/jeremylong/DependencyCheck/releases/download/v10.0.4/dependency-check-10.0.4-release.zip
          unzip dependency-check-10.0.4-release.zip

      - name: Run dependency-check
        run: |
          ./dependency-check/bin/dependency-check.sh \
            --scan . \
            --failOnCVSS 4.0

  unit-test-backend:
    runs-on: ubuntu-latest
    needs: [check-for-leaked-secrets, semgrep-scan, dependency-scan]

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, curl, openssl, bcmath, pdo_sqlite, sqlite3
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - run: composer install --no-interaction --prefer-dist

      # FIXED Laravel setup
      - name: Prepare Laravel
        run: |
          cp .env.example .env

          echo "APP_ENV=testing" >> .env
          echo "APP_URL=http://localhost" >> .env

          php artisan key:generate

          sed -i "s|DB_CONNECTION=.*|DB_CONNECTION=sqlite|" .env
          echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env

          echo "CACHE_DRIVER=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env

          echo "MAIL_MAILER=log" >> .env
          echo "BROADCAST_DRIVER=log" >> .env

          mkdir -p database
          touch database/database.sqlite

          php artisan config:clear
          php artisan cache:clear
          php artisan config:cache

          php artisan migrate --force

      - name: Run PHPUnit
        run: php artisan test --parallel

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [unit-test-backend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-backend:${{ github.ref_name }}

      - run: docker logout