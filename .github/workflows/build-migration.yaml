name: Laravel Backend CI/CD Migration

on:
  push:
    branches:
      - 'feature/*'
      - master
      - staging
      - dev

jobs:
  check-for-leaked-secrets:
    runs-on: ubuntu-latest
    container:
      image: zricethezav/gitleaks:v8.26.0
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Install Python (Alpine Linux)
        run: |
          apk update
          apk add --no-cache python3 py3-pip

      - name: Disable Git ownership check
        run: git config --global --add safe.directory "*"

      - name: Scan the code for leaked secrets
        run: gitleaks detect --verbose --source . -f json -r gitleaks.json

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies
        run: npm install

      - name: Install dependency-check CLI
        run: |
          wget https://github.com/jeremylong/DependencyCheck/releases/download/v11.1.1/dependency-check-11.1.1-release.zip
          unzip dependency-check-11.1.1-release.zip
          chmod +x dependency-check/bin/dependency-check.sh

      - name: Run dependency-check scan
        run: |
          mkdir -p ./dc-data ./reports
          ./dependency-check/bin/dependency-check.sh \
            --nvdApiDelay 7000 \
            --nvdApiKey ${{ secrets.NVD_API }} \
            --data ./dc-data \
            --scan . \
            --log ./reports/dependency-check.log \
            --enableExperimental \
            --format JSON \
            --format XML \
            --failOnCVSS 4.0 \
            --out ./reports/

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

  SAST-test:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: semgrep scan --config=auto --error --verbose --json --output semgrep.json

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, intl
          tools: composer

      - name: Install dependencies
        run: composer install

      - name: Set up .env
        run: cp .env.example .env && php artisan key:generate

      - name: Run unit tests
        run: echo "run unit test"

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [unit-test]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-backend:${{ github.ref_name }}

      - run: docker logout