name: Laravel Backend CI/CD Migration 

on:
  push:
    branches:
      - 'feature/*'
      - main
      - staging
      - dev
  pull_request:

jobs:
  check-for-leaked-secrets:
   runs-on: ubuntu-latest
   container:
     image: zricethezav/gitleaks:v8.26.0

   steps:
    - uses: actions/checkout@v3

    - name: Run Gitleaks
      run: |
        git config --global --add safe.directory "*"

        set +e
        gitleaks detect --verbose --source . -f json -r gitleaks.json
        STATUS=$?
        set -e

        if [ $STATUS -ne 0 ]; then
          echo "Leaks found"
          exit 1
        fi

        echo "No leaks found"

  semgrep-scan:
   runs-on: ubuntu-latest
   steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Semgrep and requests
      run: |
        python -m pip install --upgrade pip
        pip install semgrep requests

    - name: Run Semgrep
      id: semgrep
      continue-on-error: true
      run: semgrep scan --config=auto --json --output semgrep.json

    - name: Fail job if Semgrep found issues
      if: steps.semgrep.outcome != 'success'
      run: exit 1

  dependency-scan:
   runs-on: ubuntu-latest
   steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Cache Composer
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

    - run: composer install --no-interaction --prefer-dist --no-dev

    # ✅ Cache Dependency-Check DB (VERY IMPORTANT)
    - name: Cache Dependency-Check data
      uses: actions/cache@v4
      with:
        path: ~/.dependency-check
        key: ${{ runner.os }}-dc

    - name: Install dependency-check
      run: |
        wget https://github.com/jeremylong/DependencyCheck/releases/download/v10.0.4/dependency-check-10.0.4-release.zip
        unzip dependency-check-10.0.4-release.zip

    - name: Run dependency-check (safe mode)
      run: |
       ./dependency-check/bin/dependency-check.sh \
        --data ~/.dependency-check \
        --nvdApiKey ${{ secrets.NVD_API }} \
       --nvdApiDelay 2000 \
       --scan . \
       --failOnCVSS 4.0 \
       || echo "Dependency-Check completed with warnings"

  unit-test-backend:
    name: Unit testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: json, zip, sodium, pcntl, bcmath, curl, mbstring, pdo, sqlite, pdo_sqlite, sockets
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup environment
        run: |
          cp .env.example .env

          # App
          sed -i "s|APP_ENV=.*|APP_ENV=testing|" .env
          sed -i "s|APP_URL=.*|APP_URL=http://localhost|" .env
          sed -i "s|APP_DEBUG=.*|APP_DEBUG=false|" .env
          echo "ASSET_URL=http://localhost" >> .env

          php artisan key:generate

          # Database - SQLite
          sed -i "s|DB_CONNECTION=.*|DB_CONNECTION=sqlite|" .env
          echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env

          # Force log to file only - prevents ALL curl-based log handlers
          sed -i "s|LOG_CHANNEL=.*|LOG_CHANNEL=single|" .env
          sed -i "s|LOG_STACK=.*|LOG_STACK=single|" .env
          echo "LOG_SLACK_WEBHOOK_URL=http://localhost" >> .env
          echo "PAPERTRAIL_URL=localhost" >> .env
          echo "PAPERTRAIL_PORT=514" >> .env

          # Drivers
          echo "CACHE_STORE=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "MAIL_MAILER=log" >> .env
          echo "BROADCAST_CONNECTION=log" >> .env

          # OpenTelemetry - disable completely
          sed -i "s|OTEL_SDK_DISABLED=.*|OTEL_SDK_DISABLED=true|" .env
          sed -i "s|LARAVEL_OPENTELEMETRY_ENABLED=.*|LARAVEL_OPENTELEMETRY_ENABLED=false|" .env
          echo "OTEL_PHP_DISABLED=true" >> .env
          echo "OTEL_TRACES_EXPORTER=none" >> .env
          echo "OTEL_METRICS_EXPORTER=none" >> .env
          echo "OTEL_LOGS_EXPORTER=none" >> .env

          # RabbitMQ - dummy values (queue is sync so won't connect)
          sed -i "s|RABBITMQ_HOST=.*|RABBITMQ_HOST=localhost|" .env
          sed -i "s|RABBITMQ_PORT=.*|RABBITMQ_PORT=5672|" .env
          sed -i "s|RABBITMQ_USER=.*|RABBITMQ_USER=guest|" .env
          sed -i "s|RABBITMQ_PASSWORD=.*|RABBITMQ_PASSWORD=guest|" .env
          sed -i "s|RABBITMQ_VHOST=.*|RABBITMQ_VHOST=/|" .env
          echo "RABBITMQ_QUEUE=default" >> .env

          # Cloudinary - valid format dummy
          sed -i "s|CLOUDINARY_URL=.*|CLOUDINARY_URL=cloudinary://000000000000000:xxxxxxxxxxxxxxxx@dummy|" .env
          echo "CLOUDINARY_UPLOAD_PRESET=dummy" >> .env
          echo "CLOUDINARY_NOTIFICATION_URL=http://localhost" >> .env

          # Paystack - dummy
          echo "PAYSTACK_PUBLIC_KEY=pk_test_dummy" >> .env
          echo "PAYSTACK_SECRET_KEY=sk_test_dummy" >> .env
          echo "PAYSTACK_PAYMENT_URL=https://api.paystack.co" >> .env
          echo "MERCHANT_EMAIL=test@test.com" >> .env

          # JWT
          echo "JWT_SECRET=dummy_jwt_secret_key_for_testing_only" >> .env

          # Reverb - dummy
          echo "REVERB_APP_ID=dummy" >> .env
          echo "REVERB_APP_KEY=dummy" >> .env
          echo "REVERB_APP_SECRET=dummy" >> .env
          echo "REVERB_HOST=localhost" >> .env
          echo "REVERB_PORT=8080" >> .env
          echo "REVERB_SCHEME=http" >> .env

          # AWS - dummy
          echo "AWS_ACCESS_KEY_ID=dummy" >> .env
          echo "AWS_SECRET_ACCESS_KEY=dummy" >> .env
          echo "AWS_DEFAULT_REGION=us-east-1" >> .env
          echo "AWS_BUCKET=dummy" >> .env

          # ImageKit - dummy
          echo "IMAGEKIT_PUBLIC_KEY=dummy" >> .env
          echo "IMAGEKIT_PRIVATE_KEY=dummy" >> .env
          echo "IMAGEKIT_URL_ENDPOINT=https://ik.imagekit.io/dummy" >> .env

          # Termii SMS - dummy
          echo "TERMII_API_KEY=dummy" >> .env
          echo "TERMII_SENDER_ID=dummy" >> .env
          echo "TERMII_DEFAULT_SENDER_ID=dummy" >> .env

          # Africa's Talking - dummy
          echo "AFRICASTALKING_USERNAME=dummy" >> .env
          echo "AFRICASTALKING_API_KEY=dummy" >> .env
          echo "AFRICASTALKING_SENDER_ID=dummy" >> .env

          # Google OAuth - dummy
          echo "GOOGLE_CLIENT_ID=dummy" >> .env
          echo "GOOGLE_CLIENT_SECRET=dummy" >> .env
          echo "GOOGLE_REDIRECT=http://localhost" >> .env

          # Travi payment - dummy
          echo "TRAVI_PAYMENT_URL=http://localhost" >> .env
          echo "TRAVI_PAYMENT_KEY=dummy" >> .env
          echo "TRAVI_PAYMENT_SECRET=dummy" >> .env
          echo "TRAVI_PAYMENT_HEADER_VALUE=dummy" >> .env

          # Encoding / headers - dummy
          echo "ENCODING_KEY=dummy" >> .env
          echo "X_HEADER_KEY=dummy" >> .env
          echo "X_HEADER_VALUE=dummy" >> .env

          # SMS provider
          echo "SMS_PROVIDER=termii" >> .env

          # OAuth client
          echo "CLIENT_ID=dummy" >> .env
          echo "CLIENT_SECRET=dummy" >> .env

      - name: Setup database
        run: |
          mkdir -p database
          touch database/database.sqlite
          php artisan config:clear
          php artisan cache:clear
          php artisan migrate --force

      - name: Run tests
        run: php artisan test --parallel
        env:
          OTEL_PHP_DISABLED: "true"
          OTEL_SDK_DISABLED: "true"
          OTEL_TRACES_EXPORTER: "none"
          OTEL_METRICS_EXPORTER: "none"
          OTEL_LOGS_EXPORTER: "none"
          LARAVEL_OPENTELEMETRY_ENABLED: "false"

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [unit-test-backend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-backend:${{ github.ref_name }}

      - run: docker logout