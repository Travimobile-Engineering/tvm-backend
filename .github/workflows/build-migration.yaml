name: Laravel Backend CI/CD Migration

on:
  push:
    branches:
      - 'feature/*'
      - main
      - staging
      - dev

jobs:
  check-for-leaked-secrets:
    runs-on: ubuntu-latest
    container:
      image: zricethezav/gitleaks:v8.26.0
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Gitleaks + Upload to DefectDojo
        env:
          DEFECT_DOJO_FILE: gitleaks.json
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Gitleaks Scan
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: |
          apk add --no-cache python3 py3-pip
          pip3 install requests --break-system-packages
          git config --global --add safe.directory "*"
          gitleaks detect --verbose --source . -f json -r gitleaks.json || true
          if [ -s gitleaks.json ]; then
            echo "Leaks found, uploading to DefectDojo..."
            python3 upload-scan-report.py
            exit 1
          else
            echo "No leaks found"
          fi

  semgrep-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep and requests
        run: |
          python -m pip install --upgrade pip
          pip install semgrep requests

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: semgrep scan --config=auto --json --output semgrep.json

      - name: Upload to DefectDojo
        if: always()
        env:
          DEFECT_DOJO_FILE: semgrep.json
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Semgrep JSON Report
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: python upload-scan-report.py

      - name: Fail job if Semgrep found issues
        if: steps.semgrep.outcome != 'success'
        run: exit 1

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies
        run: npm install

      - name: Install dependency-check CLI
        run: |
          VERSION="10.0.4"
          wget https://github.com/jeremylong/DependencyCheck/releases/download/v${VERSION}/dependency-check-${VERSION}-release.zip
          unzip dependency-check-${VERSION}-release.zip
          sudo mv dependency-check /opt/dependency-check
          sudo ln -s /opt/dependency-check/bin/dependency-check.sh /usr/local/bin/dependency-check

      - name: Run dependency-check scan
        run: |
          mkdir -p ./dc-data ./reports

          NVD_ARG=""
          if [ -n "${{ secrets.NVD_API }}" ]; then
            NVD_ARG="--nvdApiKey ${{ secrets.NVD_API }}"
          fi

          dependency-check \
            --nvdApiDelay 7000 \
            $NVD_ARG \
            --data ./dc-data \
            --scan . \
            --log ./reports/dependency-check.log \
            --enableExperimental \
            --format JSON \
            --format XML \
            --failOnCVSS 4.0 \
            --project "tvm-backend" \
            --out ./reports/

      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: ./reports/dependency-check-report.xml
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Dependency Check Scan
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: python upload-scan-report.py

  unit-test:
    runs-on: ubuntu-latest
    env:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      DEV_AUTH_PATH: kv/org/dev-auth-secrets
      OTEL_SDK_DISABLED: "true"
      OTEL_PHP_AUTOLOAD_ENABLED: "false"
      OTEL_PROPAGATORS: "none"
      OTEL_TRACES_EXPORTER: "none"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      APP_ENV: testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP & extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, curl, openssl, bcmath, pdo_sqlite, sqlite3
          coverage: xdebug

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Disable OTEL Service Provider for CI
        run: |
          if [ -f bootstrap/providers.php ]; then
            sed -i 's|Keepsuit\\LaravelOpenTelemetry\\LaravelOpenTelemetryServiceProvider::class|//Keepsuit\\LaravelOpenTelemetry\\LaravelOpenTelemetryServiceProvider::class|g' bootstrap/providers.php
            echo "Patched bootstrap/providers.php"
            cat bootstrap/providers.php
          fi
          if [ -f config/app.php ]; then
            sed -i 's|Keepsuit\\LaravelOpenTelemetry\\LaravelOpenTelemetryServiceProvider::class|//Keepsuit\\LaravelOpenTelemetry\\LaravelOpenTelemetryServiceProvider::class|g' config/app.php
            echo "Patched config/app.php"
          fi

      - name: Install Vault CLI
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install vault -y

      - name: Fetch secrets from Vault
        run: |
          APP_KEY=$(vault kv get -field=APP_KEY $DEV_AUTH_PATH)
          JWT_SECRET=$(vault kv get -field=JWT_SECRET $DEV_AUTH_PATH)
          echo "APP_KEY=$APP_KEY" >> $GITHUB_ENV
          echo "JWT_SECRET=$JWT_SECRET" >> $GITHUB_ENV

      - name: Prepare Laravel
        env:
          OTEL_SDK_DISABLED: "true"
          OTEL_PHP_AUTOLOAD_ENABLED: "false"
          OTEL_PROPAGATORS: "none"
          OTEL_TRACES_EXPORTER: "none"
          OTEL_METRICS_EXPORTER: "none"
          OTEL_LOGS_EXPORTER: "none"
          OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4318"
        run: |
          cp .env.example .env

          sed -i "s|APP_KEY=.*|APP_KEY=$APP_KEY|" .env
          sed -i "s|JWT_SECRET=.*|JWT_SECRET=$JWT_SECRET|" .env

          sed -i "s|DB_CONNECTION=.*|DB_CONNECTION=sqlite|" .env
          echo "DB_DATABASE=/home/runner/work/tvm-backend/tvm-backend/database/database.sqlite" >> .env

          echo "OTEL_SDK_DISABLED=true" >> .env
          echo "OTEL_PHP_AUTOLOAD_ENABLED=false" >> .env
          echo "OTEL_PROPAGATORS=none" >> .env
          echo "OTEL_TRACES_EXPORTER=none" >> .env
          echo "OTEL_METRICS_EXPORTER=none" >> .env
          echo "OTEL_LOGS_EXPORTER=none" >> .env
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318" >> .env

          sed -i "s|CACHE_DRIVER=.*|CACHE_DRIVER=array|" .env
          sed -i "s|CACHE_STORE=.*|CACHE_STORE=array|" .env
          sed -i "s|SESSION_DRIVER=.*|SESSION_DRIVER=array|" .env
          sed -i "s|QUEUE_CONNECTION=.*|QUEUE_CONNECTION=sync|" .env

          mkdir -p database
          touch database/database.sqlite

          php artisan config:clear
          php artisan cache:clear
          php artisan migrate --force

      - name: Run PHPUnit Tests
        env:
          OTEL_SDK_DISABLED: "true"
          OTEL_PHP_AUTOLOAD_ENABLED: "false"
          OTEL_PROPAGATORS: "none"
          OTEL_TRACES_EXPORTER: "none"
          OTEL_METRICS_EXPORTER: "none"
          OTEL_LOGS_EXPORTER: "none"
          OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4318"
        run: php artisan test --parallel --coverage-text

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-backend:${{ github.ref_name }}

      - name: Logout from Docker Hub
        if: always()
        run: docker logout