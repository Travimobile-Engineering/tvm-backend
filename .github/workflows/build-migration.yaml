name: Laravel Backend CI/CD Migration

on:
  push:
    branches:
      - 'feature/*'
      - main
      - staging
      - dev

jobs:
  check-for-leaked-secrets:
    runs-on: ubuntu-latest
    container:
      image: zricethezav/gitleaks:v8.26.0

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Gitleaks + Upload to DefectDojo
        env:
          DEFECT_DOJO_FILE: gitleaks.json
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Gitleaks Scan
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend

        run: |
          # Install Python + pip
          apk add --no-cache python3 py3-pip

          # Install requests
          pip3 install requests

          # Fix git ownership issue
          git config --global --add safe.directory "*"

          # Run Gitleaks (don't fail immediately)
          gitleaks detect --verbose --source . -f json -r gitleaks.json || true

          # Check if leaks exist
          if [ -s gitleaks.json ]; then
            echo "Leaks found, uploading to DefectDojo..."
            python upload-scan-report.py
            exit 1
          else
            echo "No leaks found"
          fi


  semgrep-scan:
   runs-on: ubuntu-latest

   steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Semgrep
      run: |
        python -m pip install --upgrade pip
        pip install semgrep requests

    - name: Run Semgrep
      id: semgrep
      continue-on-error: true
      run: |
        semgrep scan --config=auto --sarif --output semgrep.sarif

    - name: Check Semgrep report
      if: always()
      run: |
        ls -lah
        test -f semgrep.json && echo "semgrep.json exists" || echo "semgrep.json missing"
        test -f semgrep.json && wc -c semgrep.json || true
        test -f semgrep.json && python -m json.tool semgrep.json > /dev/null && echo "valid json" || true

    - name: Upload to DefectDojo
      if: always()
      env:
        DEFECT_DOJO_FILE: "semgrep.sarif"
        DEFECT_DOJO_ENGAGEMENT: "1"
        DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
        DEFECT_DOJO_SCAN_TYPE: "sarif"
        DEFECT_DOJO_URL: "https://defectdojo.travimobile.com/api/v2/import-scan/"
      run: |
        python upload-scan-report.py

    - name: Fail job if Semgrep found issues
      if: steps.semgrep.outcome != 'success'
      run: exit 1

  sast-test:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: semgrep scan --config=auto --error --verbose --json --output semgrep.json

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: semgrep.json
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Semgrep JSON Report
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: python upload-scan-report.py

  unit-test:
    runs-on: ubuntu-latest
    env:
     VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
     VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
     DEV_AUTH_PATH: kv/org/dev-auth-secrets      
     OTEL_PATH: kv/org/prod-admin-panel-secrets     
     OTEL_EXPORTER_OTLP_DISABLED: true
     OTEL_SDK_DISABLED: true                        
     OTEL_TRACES_EXPORTER: none                     
     OTEL_METRICS_EXPORTER: none                    
     OTEL_LOGS_EXPORTER: none                       
     APP_ENV: testing    

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install PHP & extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, curl, openssl, bcmath, pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist
      
      - name: Install Vault CLI
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install vault -y

      - name: Fetch secrets from Vault
        id: vault-secrets
        run: |
          echo "Fetching dev-auth secrets..."
          echo "Fetching OTEL secrets..."
          OTEL_EXPORTER_OTLP_ENDPOINT=$(vault kv get -field=OTEL_EXPORTER_OTLP_ENDPOINT $OTEL_PATH)
          OTEL_EXPORTER_OTLP_PROTOCOL=$(vault kv get -field=OTEL_EXPORTER_OTLP_PROTOCOL $OTEL_PATH)

          # Write to GitHub Actions environment
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=$OTEL_EXPORTER_OTLP_ENDPOINT" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_PROTOCOL=$OTEL_EXPORTER_OTLP_PROTOCOL" >> $GITHUB_ENV  
          
          for secret in $DEV_SECRETS $OTEL_SECRETS; do
            echo "$secret" >> $GITHUB_ENV
          done

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Prepare Laravel
        run: |
          cp .env.example .env

          sed -i "s|APP_KEY=.*|APP_KEY=$APP_KEY|" .env
          sed -i "s|JWT_SECRET=.*|JWT_SECRET=$JWT_SECRET|" .env

          sed -i "s|DB_CONNECTION=.*|DB_CONNECTION=sqlite|" .env
          echo "DB_DATABASE=/home/runner/work/tvm-backend/tvm-backend/database/database.sqlite" >> .env

          # Fully disable OTEL
          echo "OTEL_SDK_DISABLED=true" >> .env
          echo "OTEL_PHP_AUTOLOAD_ENABLED=false" >> .env
          echo "OTEL_PROPAGATORS=none" >> .env
          echo "OTEL_TRACES_EXPORTER=none" >> .env
          echo "OTEL_METRICS_EXPORTER=none" >> .env
          echo "OTEL_LOGS_EXPORTER=none" >> .env
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318" >> .env

          sed -i "s|CACHE_DRIVER=.*|CACHE_DRIVER=array|" .env
          sed -i "s|CACHE_STORE=.*|CACHE_STORE=array|" .env
          sed -i "s|SESSION_DRIVER=.*|SESSION_DRIVER=array|" .env
          sed -i "s|QUEUE_CONNECTION=.*|QUEUE_CONNECTION=sync|" .env

          mkdir -p database
          touch database/database.sqlite

          php artisan config:clear
          php artisan cache:clear
          php artisan migrate --force

          # Verify .env has correct OTEL endpoint
          echo "=== Verifying OTEL config ==="
          grep "OTEL" .env

         
      - name: Run PHPUnit Tests
        run: |
          unset OTEL_EXPORTER_OTLP_ENDPOINT
          unset OTEL_EXPORTER_OTLP_PROTOCOL
          unset OTEL_SDK_DISABLED
          php artisan config:clear
          APP_ENV=testing \
          OTEL_SDK_DISABLED=true \
          OTEL_PHP_AUTOLOAD_ENABLED=false \
          OTEL_PROPAGATORS=none \
          OTEL_TRACES_EXPORTER=none \
          OTEL_METRICS_EXPORTER=none \
          OTEL_LOGS_EXPORTER=none \
          OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 \
          php artisan test --parallel --coverage-text

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-backend:${{ github.ref_name }}

      - name: Logout from Docker Hub
        if: always()
        run: docker logout