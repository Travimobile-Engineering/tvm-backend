name: Laravel Backend CI/CD Migration

on:
  push:
    branches:
      - 'feature/*'
      - main
      - staging
      - dev

jobs:
  check-for-leaked-secrets:
    runs-on: ubuntu-latest
    container:
      image: zricethezav/gitleaks:v8.26.0
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Install Python (Alpine Linux)
        run: |
          apk update
          apk add --no-cache python3 py3-pip

      - name: Disable Git ownership check
        run: git config --global --add safe.directory "*"

      - name: Scan the code for leaked secrets
        run: gitleaks detect --verbose --source . -f json -r gitleaks.json

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: gitleaks.json
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Gitleaks Scan
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: python upload-scan-report.py

      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*Gitleaks scan failed* on `${{ github.ref_name }}`"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Gitleaks Failed*\nBranch: `${{ github.ref_name }}`\nCommit: <${{ github.event.head_commit.url }}>"

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies
        run: npm install

      - name: Install dependency-check CLI
        run: |
          chmod +x dependency-check.sh
          ./dependency-check.sh

      - name: Run dependency-check scan
        run: |
          mkdir -p ./dc-data ./reports
          dependency-check \
            --nvdApiDelay 7000 \
            --nvdApiKey ${{ secrets.NVD_API }} \
            --data ./dc-data \
            --scan . \
            --log ./reports/dependency-check.log \
            --enableExperimental \
            --format JSON \
            --format XML \
            --failOnCVSS 4.0 \
            --out ./reports/

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: ./reports/dependency-check-report.xml
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Dependency Check Scan
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: python upload-scan-report.py

      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*Dependency check failed* on `${{ github.ref_name }}`"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Dependency Check Failed*\nBranch: `${{ github.ref_name }}`\nCommit: <${{ github.event.head_commit.url }}>"

  sast-test:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: semgrep scan --config=auto --error --verbose --json --output semgrep.json

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: semgrep.json
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Semgrep JSON Report
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: python upload-scan-report.py

      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*SAST scan failed* on `${{ github.ref_name }}`"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Semgrep Scan Failed*\nBranch: `${{ github.ref_name }}`\nCommit: <${{ github.event.head_commit.url }}>"

  unit-test:
    runs-on: ubuntu-latest
    env:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      DEV_AUTH_PATH: /v1/kv/org/data/dev-auth-secrets
      OTEL_PATH: kv/org/data/prod-admin-panel-secrets
      # Disable OTEL in CI
      OTEL_EXPORTER_OTLP_DISABLED: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install PHP & extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, curl, openssl, bcmath, pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist
      
      - name: Install Vault CLI
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install vault -y

      - name: Fetch secrets from Vault
        id: vault-secrets
        run: |
          echo "Fetching dev-auth secrets..."
          MAIL_USERNAME=$(vault kv get -field=MAIL_USERNAME $DEV_AUTH_PATH)
          JWT_SECRET=$(vault kv get -field=JWT_SECRET $DEV_AUTH_PATH)

          # Write to GitHub Actions environment
          echo "MAIL_USERNAME=$MAIL_USERNAME" >> $GITHUB_ENV
          echo "JWT_SECRET=$JWT_SECRET" >> $GITHUB_ENV
          
          echo "Fetching OTEL secrets..."
          OTEL_EXPORTER_OTLP_ENDPOINT=$(vault kv get -field=OTEL_EXPORTER_OTLP_ENDPOINT $OTEL_PATH)
          OTEL_EXPORTER_OTLP_PROTOCOL=$(vault kv get -field=OTEL_EXPORTER_OTLP_PROTOCOL $OTEL_PATH)

          # Write to GitHub Actions environment
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=$OTEL_EXPORTER_OTLP_ENDPOINT" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_PROTOCOL=$OTEL_EXPORTER_OTLP_PROTOCOL" >> $GITHUB_ENV  
          
          for secret in $DEV_SECRETS $OTEL_SECRETS; do
            echo "$secret" >> $GITHUB_ENV
          done

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Prepare Laravel
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan migrate --force

      - name: Run tests
        run: php artisan test --verbose

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-backend:${{ github.ref_name }}

      - name: Logout from Docker Hub
        if: always()
        run: docker logout