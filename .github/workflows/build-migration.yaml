
name: Laravel Backend CI/CD Migration

on:
  push:
    branches:
      - 'feature/*'
      - main
      - staging
      - dev

jobs:
  check-for-leaked-secrets:
    runs-on: ubuntu-latest
    container:
      image: zricethezav/gitleaks:v8.26.0
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Install Python (Alpine Linux)
        run: |
          apk update
          apk add --no-cache python3 py3-pip

      - name: Disable Git ownership check
        run: git config --global --add safe.directory "*"

      - name: Scan the code for leaked secrets
        run: gitleaks detect --verbose --source . -f json -r gitleaks.json

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: gitleaks.json
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Gitleaks Scan
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: python upload-scan-report.py

      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*Gitleaks scan failed* on `${{ github.ref_name }}`"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Gitleaks Failed*\nBranch: `${{ github.ref_name }}`\nCommit: <${{ github.event.head_commit.url }}>"

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies
        run: npm install

      - name: Install dependency-check CLI
        run: |
          chmod +x dependency-check.sh
          ./dependency-check.sh

      - name: Run dependency-check scan
        run: |
          mkdir -p ./dc-data ./reports
          dependency-check \
            --nvdApiDelay 7000 \
            --nvdApiKey ${{ secrets.NVD_API }} \
            --data ./dc-data \
            --scan . \
            --log ./reports/dependency-check.log \
            --enableExperimental \
            --format JSON \
            --format XML \
            --failOnCVSS 4.0 \
            --out ./reports/

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: ./reports/dependency-check-report.xml
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Dependency Check Scan
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: python upload-scan-report.py

      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*Dependency check failed* on `${{ github.ref_name }}`"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Dependency Check Failed*\nBranch: `${{ github.ref_name }}`\nCommit: <${{ github.event.head_commit.url }}>"

  SAST-test:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: semgrep scan --config=auto --error --verbose --json --output semgrep.json

      - name: Install requests package
        if: always()
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install requests

        
      - name: Upload to DefectDojo
        if: failure()
        env:
          DEFECT_DOJO_FILE: semgrep.json
          DEFECT_DOJO_ENGAGEMENT: 1
          DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
          DEFECT_DOJO_SCAN_TYPE: Semgrep JSON Report
          DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
          DEFECT_DOJO_PRODUCT_NAME: Backend
        run: python upload-scan-report.py

      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*SAST scan failed* on `${{ github.ref_name }}`"
            blocks:
              text:
                 type: mrkdwn
                  text: "*Semgrep Scan Failed*\nBranch: `${{ github.ref_name }}`\nCommit: <${{ github.event.head_commit.url }}>"

  unit-test:
    runs-on: ubuntu-latest

    #  Only safe CI configs here (NO hardcoded secrets)
    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, intl, pdo_sqlite
          tools: composer

      #  Required for parsing Vault JSON
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      #  FETCH ALL SECRETS FROM VAULT
      - name: Test Vault connection
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |  
          echo "Vault address: $VAULT_ADDR"
          RESPONSE=$(curl --fail --silent --show-error \
          --header "X-Vault-Token: $VAULT_TOKEN" \
          $VAULT_ADDR/v1/kv/org/data/prod-admin-panel-secrets)
                
          if [ -z "$RESPONSE" ]; then echo "Vault unreachable or secret missing" exit 1
          fi
          #  CORE APP
          APP_KEY=$(echo $RESPONSE | jq -r '.data.data.APP_KEY')
          APP_URL=$(echo $RESPONSE | jq -r '.data.data.APP_URL')
          JWT_SECRET=$(echo $RESPONSE | jq -r '.data.data.JWT_SECRET')

          #  EXTERNAL SERVICES
          PAYSTACK_URL=$(echo $RESPONSE | jq -r '.data.data.PAYSTACK_URL')
          CLOUDINARY_URL=$(echo $RESPONSE | jq -r '.data.data.CLOUDINARY_URL')

          # FALLBACKS (prevents pipeline failure)
          APP_URL=${APP_URL:-http://localhost}
          PAYSTACK_URL=${PAYSTACK_URL:-https://api.paystack.co}

          # FAIL FAST if critical secrets missing
          if [ -z "$APP_KEY" ]; then
            echo "APP_KEY missing from Vault!"
            exit 1
          fi

          if [ -z "$JWT_SECRET" ]; then
            echo "JWT_SECRET missing from Vault!"
            exit 1
          fi

          APP_KEY=$(echo $RESPONSE | jq -r '.data.data.APP_KEY')
          JWT_SECRET=$(echo $RESPONSE | jq -r '.data.data.JWT_SECRET')
          APP_URL=$(echo $RESPONSE | jq -r '.data.data.APP_URL // "http://localhost"')
          PAYSTACK_URL=$(echo $RESPONSE | jq -r '.data.data.PAYSTACK_PAYMENT_URL // "https://api.paystack.co"')
          CLOUDINARY_URL=$(echo $RESPONSE | jq -r '.data.data.CLOUDINARY_URL')

          # EXPORT ENV
          echo "APP_KEY=$APP_KEY" >> $GITHUB_ENV
          echo "APP_URL=$APP_URL" >> $GITHUB_ENV
          echo "JWT_SECRET=$JWT_SECRET" >> $GITHUB_ENV
          echo "PAYSTACK_URL=$PAYSTACK_URL" >> $GITHUB_ENV
          echo "CLOUDINARY_URL=$CLOUDINARY_URL" >> $GITHUB_ENV

          # FORCE SQLITE FOR CI (avoid DB failures)
          echo "DB_CONNECTION=sqlite" >> $GITHUB_ENV
          echo "DB_DATABASE=:memory:" >> $GITHUB_ENV

          # Disable OTLP in CI to avoid cURL errors
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=" >> $GITHUB_ENV

      # Cache dependencies (faster builds)
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # Laravel setup (NO key:generate — using Vault)
      - name: Prepare Laravel
        run: |
          cp .env.example .env || true

      - name: Clear config cache
        run: php artisan config:clear

      # Optional debug (remove later)
      - name: Debug env
        run: |
          echo "APP_URL=$APP_URL"
          echo "JWT_SECRET is set"

      # Run tests
      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-backend:${{ github.ref_name }}

      - name: Logout from Docker Hub
        if: always()
        run: docker logout
