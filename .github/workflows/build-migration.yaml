name: Laravel Backend CI/CD Migration 

on:
  push:
    branches:
      - 'feature/*'
      - main
      - staging
      - dev
  pull_request:

jobs:
  check-for-leaked-secrets:
   runs-on: ubuntu-latest
   container:
     image: zricethezav/gitleaks:v8.26.0

   steps:
    - uses: actions/checkout@v3

    - name: Run Gitleaks
      run: |
        git config --global --add safe.directory "*"

        set +e
        gitleaks detect --verbose --source . -f json -r gitleaks.json
        STATUS=$?
        set -e

        if [ $STATUS -ne 0 ]; then
          echo "Leaks found"
          exit 1
        fi

        echo "No leaks found"

  semgrep-scan:
   runs-on: ubuntu-latest
   steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Semgrep and requests
      run: |
        python -m pip install --upgrade pip
        pip install semgrep requests

    - name: Run Semgrep
      id: semgrep
      continue-on-error: true
      run: semgrep scan --config=auto --json --output semgrep.json

    - name: Fail job if Semgrep found issues
      if: steps.semgrep.outcome != 'success'
      run: exit 1

  dependency-scan:
   runs-on: ubuntu-latest
   steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Cache Composer
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

    - run: composer install --no-interaction --prefer-dist --no-dev

    # ✅ Cache Dependency-Check DB (VERY IMPORTANT)
    - name: Cache Dependency-Check data
      uses: actions/cache@v4
      with:
        path: ~/.dependency-check
        key: ${{ runner.os }}-dc

    - name: Install dependency-check
      run: |
        wget https://github.com/jeremylong/DependencyCheck/releases/download/v10.0.4/dependency-check-10.0.4-release.zip
        unzip dependency-check-10.0.4-release.zip

    - name: Run dependency-check (safe mode)
      run: |
       ./dependency-check/bin/dependency-check.sh \
        --data ~/.dependency-check \
        --nvdApiKey ${{ secrets.NVD_API }} \
       --nvdApiDelay 2000 \
       --scan . \
       --failOnCVSS 4.0 \
       || echo "Dependency-Check completed with warnings"

  unit-test-backend:
    name: Unit testing
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: "8.4"
        extensions: json, zip, sodium, pcntl, bcmath, curl, mbstring, pdo, sqlite, pdo_sqlite, sockets
        coverage: none

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: ~/.composer/cache/files
        key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

    - name: Install dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader

    - name: Setup environment
      run: |
        cp .env.example .env
        php artisan key:generate
        echo "APP_ENV=testing" >> .env
        echo "APP_URL=http://localhost" >> .env
        echo "ASSET_URL=http://localhost" >> .env
        sed -i "s|DB_CONNECTION=.*|DB_CONNECTION=sqlite|" .env
        sed -i "/^DB_HOST/d" .env
        sed -i "/^DB_PORT/d" .env
        sed -i "/^DB_DATABASE/d" .env
        sed -i "/^DB_USERNAME/d" .env
        sed -i "/^DB_PASSWORD/d" .env
        echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env
        echo "CACHE_DRIVER=array" >> .env
        echo "SESSION_DRIVER=array" >> .env
        echo "QUEUE_CONNECTION=sync" >> .env
        echo "MAIL_MAILER=log" >> .env
        echo "BROADCAST_DRIVER=log" >> .env
        echo "OTEL_PHP_DISABLED=true" >> .env
        echo "OTEL_TRACES_EXPORTER=none" >> .env
        echo "OTEL_METRICS_EXPORTER=none" >> .env
        echo "OTEL_LOGS_EXPORTER=none" >> .env
        echo "OTEL_ENABLED=false" >> .env
        echo "RABBITMQ_HOST=localhost" >> .env
        echo "RABBITMQ_PORT=5672" >> .env
        echo "RABBITMQ_USER=guest" >> .env
        echo "RABBITMQ_PASSWORD=guest" >> .env
        echo "RABBITMQ_VHOST=/" >> .env
        echo "CLOUDINARY_URL=cloudinary://000000000000000:xxxxxxxxxxxxxxxx@dummy" >> .env
        echo "FIREBASE_PROJECT_ID=dummy-project" >> .env
        echo "FIREBASE_CREDENTIALS=" >> .env
        echo "PAYSTACK_PUBLIC_KEY=pk_test_dummy" >> .env
        echo "PAYSTACK_SECRET_KEY=sk_test_dummy" >> .env
        echo "PAYSTACK_PAYMENT_URL=https://api.paystack.co" >> .env
        echo "IMAGEKIT_PUBLIC_KEY=dummy" >> .env
        echo "IMAGEKIT_PRIVATE_KEY=dummy" >> .env
        echo "IMAGEKIT_URL_ENDPOINT=https://ik.imagekit.io/dummy" >> .env

    - name: Setup database
      run: |
        mkdir -p database
        touch database/database.sqlite
        php artisan config:clear
        php artisan cache:clear
        php artisan migrate --force

    - name: Run tests
      run: php artisan test --parallel
      env:
        OTEL_PHP_DISABLED: "true"
        OTEL_TRACES_EXPORTER: "none"
        OTEL_METRICS_EXPORTER: "none"
        OTEL_LOGS_EXPORTER: "none"

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [unit-test-backend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-backend:${{ github.ref_name }}

      - run: docker logout