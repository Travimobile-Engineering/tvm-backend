name: Laravel Backend CI/CD Migration 

on:
  push:
    branches:
      - 'feature/*'
      - main
      - staging
      - dev
  pull_request:

jobs:
  check-for-leaked-secrets:
   runs-on: ubuntu-latest
   container:
     image: zricethezav/gitleaks:v8.26.0

   steps:
    - uses: actions/checkout@v3

    - name: Run Gitleaks
      run: |
        git config --global --add safe.directory "*"

        set +e
        gitleaks detect --verbose --source . -f json -r gitleaks.json
        STATUS=$?
        set -e

        if [ $STATUS -ne 0 ]; then
          echo "Leaks found"
          exit 1
        fi

        echo "No leaks found"

  semgrep-scan:
   runs-on: ubuntu-latest
   steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Semgrep and requests
      run: |
        python -m pip install --upgrade pip
        pip install semgrep requests

    - name: Run Semgrep
      id: semgrep
      continue-on-error: true
      run: semgrep scan --config=auto --json --output semgrep.json

    - name: Fail job if Semgrep found issues
      if: steps.semgrep.outcome != 'success'
      run: exit 1

  dependency-scan:
   runs-on: ubuntu-latest
   steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Cache Composer
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

    - run: composer install --no-interaction --prefer-dist --no-dev

    # ✅ Cache Dependency-Check DB (VERY IMPORTANT)
    - name: Cache Dependency-Check data
      uses: actions/cache@v4
      with:
        path: ~/.dependency-check
        key: ${{ runner.os }}-dc

    - name: Install dependency-check
      run: |
        wget https://github.com/jeremylong/DependencyCheck/releases/download/v10.0.4/dependency-check-10.0.4-release.zip
        unzip dependency-check-10.0.4-release.zip

    - name: Run dependency-check (safe mode)
      run: |
       ./dependency-check/bin/dependency-check.sh \
        --data ~/.dependency-check \
        --nvdApiKey ${{ secrets.NVD_API }} \
       --nvdApiDelay 2000 \
       --scan . \
       --failOnCVSS 4.0 \
       || echo "Dependency-Check completed with warnings"

  unit-test-backend:
    name: Unit testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('composer.lock') }}

      - name: Installing dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.1
          php_extensions: "json zip sodium pcntl bcmath"

      - name: Running unit test
        uses: php-actions/phpunit@v3
        with:
          version: 9.6
          php_version: 8.1
          php_extensions: "json zip sodium pcntl bcmath"
          args: "-d date.timezone=Asia/Jakarta"
          memory_limit: 300M
          configuration: phpunit.xml
          testsuite: unittest

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [unit-test-backend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-backend:${{ github.ref_name }}

      - run: docker logout