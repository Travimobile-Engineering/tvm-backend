name: Build and Push Travi Backend Image to Docker Hub

on:
  push:
    branches: [ master, staging, dev ]

env:
  IMAGE_NAME: travi3/travimobile-backend-nginx

jobs:
  build-image:
    runs-on: ubuntu-latest
    name: 'Build and push Docker image to Docker Hub'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Get full history for proper SHA

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Set up tags
        id: set-tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          
          if [[ "$GITHUB_REF" == "refs/heads/master" ]]; then
            echo "TAG=main-$SHORT_SHA" >> $GITHUB_ENV
            echo "BRANCH_TAG=main" >> $GITHUB_ENV
          elif [[ "$GITHUB_REF" == "refs/heads/staging" ]]; then
            echo "TAG=stg-$SHORT_SHA" >> $GITHUB_ENV
            echo "BRANCH_TAG=staging" >> $GITHUB_ENV
          elif [[ "$GITHUB_REF" == "refs/heads/dev" ]]; then
            echo "TAG=dev-$SHORT_SHA" >> $GITHUB_ENV
            echo "BRANCH_TAG=dev" >> $GITHUB_ENV
          fi
          
          echo "Using tag: $TAG"

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.nginx -t $IMAGE_NAME:${{ env.TAG }} .
          docker tag $IMAGE_NAME:${{ env.TAG }} $IMAGE_NAME:${{ env.BRANCH_TAG }}

      - name: Push Docker image to Docker Hub
        run: |
          docker push $IMAGE_NAME:${{ env.TAG }}
          docker push $IMAGE_NAME:${{ env.BRANCH_TAG }}

      - name: Logout from Docker Hub
        if: always()
        run: docker logout