name: Build and Push Travi Backend Image to Registry

on:
  push:
    branches: [ main, staging, dev ]

env:
  IMAGE_URI: "820242924853.dkr.ecr.eu-west-2.amazonaws.com/backend"

permissions:
  id-token: write
  contents: read

jobs:
  build-image:
    runs-on: ubuntu-latest
    name: 'Build and push docker image to Artifact Registry'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Trivy
      run: |
        wget https://github.com/aquasecurity/trivy/releases/download/v0.18.3/trivy_0.18.3_Linux-64bit.deb
        sudo dpkg -i trivy_0.18.3_Linux-64bit.deb

    - name: Export AWS Credentials using OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::820242924853:role/github_actions_role20250624143236171300000001
        aws-region: eu-west-2

    - name: Authenticate to AWS ECR
      run: aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin $IMAGE_URI

    - name: Extract short commit SHA
      id: vars
      run: echo "short_commit_sha=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: Determine tag
      id: tag
      run: |
        if [[ $GITHUB_REF == refs/heads/main ]]; then
          echo "tag=${{ env.short_commit_sha }}-prod" >> $GITHUB_ENV
        elif [[ $GITHUB_REF == refs/heads/staging ]]; then
          echo "tag=${{ env.short_commit_sha }}-stg" >> $GITHUB_ENV
        elif [[ $GITHUB_REF == refs/heads/dev ]]; then
          echo "tag=${{ env.short_commit_sha }}-dev" >> $GITHUB_ENV
        fi

    - name: Build Docker image
      run: docker build -t $IMAGE_URI:${{ env.tag }} .

    #- name: Trivy image scan
    #  run: trivy image --exit-code 1 --format json --output trivy-results.json $IMAGE_URI:${{ env.tag }}

    - name: Setup Python for scan report upload
      if: always()
      run: |
        python3 -m venv venv
        . venv/bin/activate
        pip install --upgrade pip
        pip install requests

    - name: Determine DefectDojo Engagement ID
      if: failure()
      id: ID
      run: |
        if [[ $GITHUB_REF == refs/heads/main ]]; then
          echo ID=11 >> $GITHUB_ENV
        elif [[ $GITHUB_REF == refs/heads/staging ]]; then
          echo ID=10 >> $GITHUB_ENV
        elif [[ $GITHUB_REF == refs/heads/dev ]]; then
          echo ID=9 >> $GITHUB_ENV
        fi

    - name: Upload to DefectDojo
      if: failure()
      env:
        DEFECT_DOJO_FILE: trivy-results.json
        DEFECT_DOJO_ENGAGEMENT: ${{ env.ID }}
        DEFECT_DOJO_API_TOKEN: ${{ secrets.DEFECT_DOJO_API_TOKEN }}
        DEFECT_DOJO_SCAN_TYPE: Trivy Scan
        DEFECT_DOJO_URL: https://defectdojo.travimobile.com/api/v2/import-scan/
        DEFECT_DOJO_PRODUCT_NAME: Travi-Backend
      run: python upload-scan-report.py

    - name: Push Docker image
      run: docker push $IMAGE_URI:${{ env.tag }}

    - name: Slack alert on failure (generic)
      if: failure()
      uses: slackapi/slack-github-action@v2.1.0
      with:
        webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
        webhook-type: incoming-webhook
        payload: |
          text: "*Build Failed*: ${{ job.status }}\n<${{ github.event.head_commit.url }}> by @${{ github.actor }} on `${{ github.ref_name }}`"
          blocks:
          - type: section
            text:
              type: mrkdwn
              text: "*Build & Push Failed*\n<${{ github.event.head_commit.url }}|View Commit>\n*Triggered by:* @${{ github.actor }}\n*Branch:* `${{ github.ref_name }}`"
